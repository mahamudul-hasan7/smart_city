<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Department | SmartCity Admin</title>
  <link rel="stylesheet" href="admin-shared.css">
  <link rel="stylesheet" href="admin-dashboard.css">
  <link rel="stylesheet" href="admin-add-department.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- GLOBAL HEADER -->
<header class="global-header">
  <div class="header-left">
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <a href="admin-dashboard.html" class="logo-text">Smart<span>City</span></a>
  </div>
  <div class="header-right">
    <span class="page-title">Add Department</span>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</header>

<div class="layout" id="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="admin-assign.html"><i class="fas fa-tasks"></i> Assign</a>
    <a href="all-complaints.html"><i class="fas fa-list"></i> All Complaints</a>
    <a class="active" href="admin-departments.html"><i class="fas fa-building"></i> Departments</a>
    <a href="admin-staff.html"><i class="fas fa-users"></i> Staff</a>
    <a href="admin-zones.html"><i class="fas fa-map-marker-alt"></i> Zones</a>
    <a href="admin-reports.html"><i class="fas fa-file-alt"></i> Reports</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- PAGE HEADER -->
    <section class="page-header">
      <h1 class="page-title-main">Add Department</h1>
      <p class="page-subtitle">Register a new city department with official contact information</p>
    </section>

    <!-- FORM SECTION -->
    <section class="form-container">

      <form id="departmentForm">
        <div class="form-section">
          <h3 class="form-section-title"><i class="fas fa-building"></i> Department Information</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Department ID <span class="auto-badge">Auto-Generated</span></label>
              <input type="text" name="dept_id" id="dept_id" placeholder="Auto-generated" readonly>
              <small class="next-id-info" id="nextIdInfo">Next Department ID: --</small>
              <span class="form-error" id="error-dept_id"></span>
            </div>
            <div class="form-group">
              <label>Department Name <span class="required">*</span></label>
              <input type="text" id="dept_name" name="name" placeholder="e.g., Road & Transport" required>
              <span class="form-error" id="error-dept_name"></span>
            </div>
            <div class="form-group">
              <label>Email Address <span class="required">*</span></label>
              <input type="email" id="dept_email" name="email" placeholder="dept@smartcity.gov" required>
              <span class="form-error" id="error-dept_email"></span>
            </div>
            <div class="form-group">
              <label>Phone Number <span class="required">*</span></label>
              <input type="tel" id="dept_phone" name="phone" placeholder="+880 17XXXXXXXX" required>
              <span class="form-error" id="error-dept_phone"></span>
            </div>
          </div>
        </div>
        <div class="form-section">
          <h3 class="form-section-title"><i class="fas fa-map-pin"></i> Address Information</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Street Address</label>
              <input type="text" id="dept_street" name="street" placeholder="Main Road">
              <span class="form-error" id="error-dept_street"></span>
            </div>
            <div class="form-group">
              <label>Area / Zone</label>
              <input type="text" id="dept_area" name="area" placeholder="Mirpur">
              <span class="form-error" id="error-dept_area"></span>
            </div>
            <div class="form-group">
              <label>City</label>
              <input type="text" id="dept_city" name="city" value="Dhaka" readonly>
              <span class="form-error" id="error-dept_city"></span>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Save Department</button>
          <a href="admin-departments.html" class="btn-cancel"><i class="fas fa-times"></i> Cancel</a>
        </div>
      </form>
    </section>
  </main>
</div>

<!-- SAVING OVERLAY -->
<div class="overlay" id="overlay">
  <div class="save-box">
    <div class="spinner" id="spinner"></div>
    <svg class="checkmark" id="checkmark" viewBox="0 0 52 52">
      <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
      <path class="checkmark-check" d="M14 27l7 7 17-17"/>
    </svg>
    <p class="save-text" id="saveText">Saving department...</p>
  </div>
</div>

<script src="admin-add-department.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Staff | SmartCity Admin</title>

  <!-- shared styles -->
  <link rel="stylesheet" href="admin-shared.css">
  <!-- dashboard base css -->
  <link rel="stylesheet" href="admin-dashboard.css">
  <!-- staff form css -->
  <link rel="stylesheet" href="admin-add-staff.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- GLOBAL HEADER -->
<header class="global-header">
  <div class="header-left">
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <a href="admin-dashboard.html" class="logo-text">Smart<span>City</span></a>
  </div>
  <div class="header-right">
    <span class="page-title">Add Staff Member</span>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</header>

<div class="layout" id="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="admin-assign.html"><i class="fas fa-tasks"></i> Assign</a>
    <a href="all-complaints.html"><i class="fas fa-list"></i> All Complaints</a>
    <a href="admin-departments.html"><i class="fas fa-building"></i> Departments</a>
    <a class="active" href="admin-staff.html"><i class="fas fa-users"></i> Staff</a>
    <a href="admin-zones.html"><i class="fas fa-map-marker-alt"></i> Zones</a>
    <a href="admin-reports.html"><i class="fas fa-file-alt"></i> Reports</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- PAGE HEADER -->
    <section class="page-header">
      <h1 class="page-title-main">Add Staff Member</h1>
      <p class="page-subtitle">Register a new staff and assign department & zone</p>
    </section>

    <!-- FORM SECTION -->
    <section class="form-container">
      <form id="staffForm">

        <div class="form-section">
          <h3 class="form-section-title"><i class="fas fa-user"></i> Personal Information</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Staff ID <span class="auto-badge">Auto-Generated</span></label>
              <input type="text" name="staff_id" id="staff_id" placeholder="Auto-generated" readonly>
              <small class="next-id-info" id="nextIdInfo">Next Staff ID: --</small>
              <span class="form-error" id="error-staff_id"></span>
            </div>

            <div class="form-group">
              <label>Full Name <span class="required">*</span></label>
              <input type="text" name="full_name" id="full_name" placeholder="Enter full name" required>
              <span class="form-error" id="error-full_name"></span>
            </div>

            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" id="email" placeholder="staff@smartcity.com">
              <span class="form-error" id="error-email"></span>
            </div>

            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" name="phone" id="phone" placeholder="01XXXXXXXXX">
              <span class="form-error" id="error-phone"></span>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h3 class="form-section-title"><i class="fas fa-briefcase"></i> Job Information</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Role / Designation <span class="required">*</span></label>
              <select name="designation" id="designation" required>
                <option value="">Select Role/Designation</option>
                <option value="Field Officer">Field Officer</option>
                <option value="Supervisor">Supervisor</option>
                <option value="Senior Officer">Senior Officer</option>
                <option value="Inspector">Inspector</option>
                <option value="Coordinator">Coordinator</option>
                <option value="Manager">Manager</option>
                <option value="Officer">Officer</option>
              </select>
              <span class="form-error" id="error-designation"></span>
            </div>

            <div class="form-group">
              <label>Zone <span class="required">*</span></label>
              <select name="zone" id="zone" required>
                <option value="">Select Zone</option>
              </select>
              <span class="form-error" id="error-zone"></span>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Save Staff</button>
          <a href="admin-staff.html" class="btn-cancel"><i class="fas fa-times"></i> Cancel</a>
        </div>

      </form>
    </section>

  </main>
</div>

<!-- SAVING OVERLAY -->
<div class="overlay" id="overlay">
  <div class="save-box">
    <div class="spinner" id="spinner"></div>

    <svg class="checkmark" id="checkmark" viewBox="0 0 52 52">
      <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
      <path class="checkmark-check" d="M14 27l7 7 17-17"/>
    </svg>

    <p class="save-text" id="saveText">Saving staff...</p>
  </div>
</div>


<script src="admin-add-staff.js"></script>
</body>
</html>
